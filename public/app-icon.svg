<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background fills entire canvas -->
  <rect width="512" height="512" fill="#4f46e5"/>
  
  <!-- Clipboard body -->
  <rect x="145" y="140" width="210" height="260" rx="16" ry="16" fill="none" stroke="white" stroke-width="14"/>
  
  <!-- Clip at top -->
  <rect x="210" y="120" width="80" height="35" rx="6" ry="6" fill="white"/>
  <circle cx="250" cy="137" r="7" fill="#4f46e5"/>
  
  <!-- Pen -->
  <g transform="translate(310, 220) rotate(35)">
    <!-- Pen body -->
    <rect x="-10" y="-75" width="20" height="110" rx="4" ry="4" fill="white"/>
    <!-- Pen grip lines -->
    <line x1="-7" y1="15" x2="7" y2="15" stroke="#4f46e5" stroke-width="2.5"/>
    <line x1="-7" y1="23" x2="7" y2="23" stroke="#4f46e5" stroke-width="2.5"/>
    <line x1="-7" y1="31" x2="7" y2="31" stroke="#4f46e5" stroke-width="2.5"/>
    <!-- Pen tip -->
    <polygon points="-10,35 10,35 0,58" fill="white"/>
    <!-- Pen cap -->
    <rect x="-7" y="-88" width="14" height="18" rx="4" ry="4" fill="white"/>
  </g>
</svg>