<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 512;

// Fill entire canvas with indigo
ctx.fillStyle = '#4f46e5';
ctx.fillRect(0, 0, W, W);

// Draw clipboard
ctx.strokeStyle = 'white';
ctx.fillStyle = 'white';
ctx.lineWidth = 12;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// Clipboard body
const cx = W/2 - 10, cy = W/2 + 10;
const bw = 160, bh = 190;
ctx.beginPath();
ctx.roundRect(cx - bw/2, cy - bh/2, bw, bh, 12);
ctx.stroke();

// Clip at top
const clipW = 70, clipH = 28;
ctx.fillStyle = 'white';
ctx.beginPath();
ctx.roundRect(cx - clipW/2, cy - bh/2 - 10, clipW, clipH, 6);
ctx.fill();

// Clip hole
ctx.fillStyle = '#4f46e5';
ctx.beginPath();
ctx.arc(cx, cy - bh/2 - 10 + clipH/2, 6, 0, Math.PI * 2);
ctx.fill();

// Pen
ctx.strokeStyle = 'white';
ctx.fillStyle = 'white';
ctx.lineWidth = 10;

ctx.save();
ctx.translate(cx + 30, cy);
ctx.rotate(-0.5);

// Pen body
ctx.beginPath();
ctx.roundRect(-8, -70, 16, 110, 4);
ctx.fill();

// Pen grip lines
ctx.strokeStyle = '#4f46e5';
ctx.lineWidth = 2.5;
for (let i = 0; i < 3; i++) {
  ctx.beginPath();
  ctx.moveTo(-6, 20 + i * 10);
  ctx.lineTo(6, 20 + i * 10);
  ctx.stroke();
}

// Pen tip
ctx.fillStyle = 'white';
ctx.beginPath();
ctx.moveTo(-8, 40);
ctx.lineTo(8, 40);
ctx.lineTo(0, 65);
ctx.closePath();
ctx.fill();

// Pen top
ctx.fillStyle = 'white';
ctx.beginPath();
ctx.roundRect(-5, -80, 10, 15, 3);
ctx.fill();

ctx.restore();

// Output
const link = document.createElement('a');
link.download = 'app-icon-512.png';
link.href = canvas.toDataURL('image/png');
link.textContent = 'Download 512';
document.body.appendChild(link);

// 192
const c2 = document.createElement('canvas');
c2.width = 192; c2.height = 192;
const ctx2 = c2.getContext('2d');
ctx2.drawImage(canvas, 0, 0, 192, 192);
const link2 = document.createElement('a');
link2.download = 'app-icon-192.png';
link2.href = c2.toDataURL('image/png');
link2.textContent = ' Download 192';
document.body.appendChild(link2);
</script>
</body>
</html>
